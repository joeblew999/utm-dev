# mise.toml — tool version pins + tasks for goup-util
#
# Install: https://mise.jdx.dev
# Usage:   mise install   (installs all tools)
#          mise run build
#
# Replaces: Taskfile (task runner), direnv (env vars)
# Go is managed here — no system Go required.

[tools]
go = "1.25"  # Go runtime — https://go.dev

# ── Tauri (desktop + mobile builds, OS-gated) ────────────────────────────────
# tauri-cli: macOS + Windows (builds .app/.dmg and .msi/.exe)
# xcodegen + ruby: macOS only — needed for iOS target (.xcodeproj generation + CocoaPods)
"cargo:tauri-cli" = {version = "2",      os = ["macos", "windows"]}
xcodegen          = {version = "latest", os = ["macos"]}
ruby              = {version = "3.3",    os = ["macos"]}

# ── Tasks ────────────────────────────────────────────────────────────────────
# Kept minimal — goup-util IS the CLI. Use `goup-util <subcommand>` directly
# for utm, android, ios, sdk etc. These tasks cover the dev loop only.
# go.work is gitignored (local dev only) — mise doesn't set GOWORK so it
# resolves naturally: present → workspace mode, absent → module mode.

[tasks.build]
description = "Build goup-util binary for local dev"
run = "go build -o .bin/goup-util ."

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.ci]
description = "Full CI gate — test + build all platforms"
run = [
    "go test ./...",
    "go run . self build --obfuscate",
]

[tasks.release]
description = "Tag and push to trigger GitHub Actions release (patch|minor|major|vX.Y.Z)"
run = "go run . self release ${1:-minor}"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf .bin .dist"
