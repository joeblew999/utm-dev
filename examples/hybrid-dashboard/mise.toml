# mise.toml — hybrid-dashboard example runner
# Usage: mise run dev | mise run build | mise run ios | mise run android | mise run windows
#        mise run dev:deeplink   — launch with custom URI scheme

[tasks.dev]
description = "Run on macOS (dev mode)"
run = "utm-dev gio run macos ."

[tasks."dev:deeplink"]
description = "Run on macOS with deep link scheme"
run = "utm-dev gio run --schemes hybrid macos ."

[tasks.build]
description = "Build for macOS"
run = "utm-dev gio build macos ."

[tasks.ios]
description = "Run on iOS simulator (macOS only)"
run = "utm-dev gio run ios-simulator ."

[tasks.android]
description = "Run on Android device/emulator"
run = "utm-dev gio run android ."

[tasks.windows]
description = "Build and run in Windows UTM VM"
run = "utm-dev utm run 'Windows 11' ."
