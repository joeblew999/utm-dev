# mise.toml — gio-plugin-webviewer example runner
# Usage: mise run dev | mise run build | mise run ios | mise run android | mise run windows

[tasks.dev]
description = "Run on macOS (dev mode)"
run = "utm-dev run macos ."

[tasks.build]
description = "Build for macOS"
run = "utm-dev build macos ."

[tasks.ios]
description = "Run on iOS simulator (macOS only)"
run = "utm-dev run ios ."

[tasks.android]
description = "Run on Android device/emulator"
run = "utm-dev run android ."

[tasks.windows]
description = "Build and run in Windows UTM VM"
run = "utm-dev utm run 'Windows 11' ."
