# mise.toml — tauri-basic example
#
# Getting started:
#   mise run init             Add tools + env (one time)
#   mise install              Install tools
#   mise run setup            Install Tauri dev prereqs
#   mise run dev              macOS desktop dev mode
#   mise run ios              iOS simulator
#   mise run android          Android emulator
#   mise run vm:build         Build Windows .msi/.exe in the VM

# Pull in utm-dev tasks (init, setup, vm:up, vm:down, vm:exec, vm:delete, doctor)
[task_config]
includes = ["git::https://github.com/joeblew999/utm-dev.git//.mise/tasks?ref=main"]

# ── App tasks ────────────────────────────────────────────────────────────────

[tasks.dev]
description = "Run macOS desktop app in dev mode"
run = "cargo tauri dev"

[tasks.build]
description = "Build macOS desktop bundle (.app/.dmg)"
run = "cargo tauri build"

[tasks.ios]
description = "Run on iOS simulator (boots sim + initialises on first run)"
run = """
#!/usr/bin/env bash
set -eu
# Boot a simulator if none running
if ! xcrun simctl list devices booted 2>/dev/null | grep -q Booted; then
  echo "→ Booting iOS simulator..."
  DEVICE=$(xcrun simctl list devices available -j | python3 -c "
import json,sys
data = json.load(sys.stdin)
for runtime, devices in data['devices'].items():
  if 'iOS' in runtime:
    for d in devices:
      if d['isAvailable'] and 'iPhone' in d['name']:
        print(d['udid']); sys.exit(0)
" 2>/dev/null)
  [ -n "${DEVICE}" ] && xcrun simctl boot "${DEVICE}" 2>/dev/null || true
fi
cargo tauri ios init 2>/dev/null || true
cargo tauri ios dev
"""

[tasks.android]
description = "Run on Android emulator (initialises on first run)"
run = """
#!/usr/bin/env bash
set -eu
cargo tauri android init 2>/dev/null || true
cargo tauri android dev
"""
