# mise.toml — tauri-basic example
#
# Getting started:
#   mise run init             Add tools + env (one time)
#   mise install              Install tools
#   mise run setup            Install Tauri dev prereqs
#   mise run dev              macOS desktop dev mode
#   mise run ios              iOS simulator
#   mise run android          Android emulator

# Pull in utm-dev tasks (init, setup, vm:up, vm:down, vm:exec, vm:delete)
[task_config]
includes = ["git::https://github.com/joeblew999/utm-dev.git//.mise/tasks?ref=main"]

# ── Added by: mise run init ──────────────────────────────────────────────────

# utm-dev tools — added by mise run init
[tools]
"cargo:tauri-cli" = {version = "2",      os = ["macos", "windows"]}
xcodegen          = {version = "latest", os = ["macos"]}
ruby              = {version = "3.3",    os = ["macos"]}
java              = "temurin-17.0.18+8"

# utm-dev env — Android SDK paths (installed by mise run setup)
[env]
ANDROID_HOME = "{{env.HOME}}/.android-sdk"
NDK_HOME = "{{env.HOME}}/.android-sdk/ndk/27.2.12479018"
JAVA_HOME = "{{env.HOME}}/.local/share/mise/installs/java/temurin-17.0.18+8"

# ── App tasks ────────────────────────────────────────────────────────────────

[tasks.dev]
description = "Run macOS desktop app in dev mode"
run = "cargo tauri dev"

[tasks.build]
description = "Build macOS desktop bundle (.app/.dmg)"
run = "cargo tauri build"

[tasks.ios]
description = "Run on iOS simulator (initialises on first run)"
run = """
cargo tauri ios init 2>/dev/null || true
cargo tauri ios dev
"""

[tasks.android]
description = "Run on Android emulator (initialises on first run)"
run = """
cargo tauri android init 2>/dev/null || true
cargo tauri android dev
"""
