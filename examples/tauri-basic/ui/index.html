<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tauri Basic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #aaa; margin-top: 0.5rem; }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: #2d2d44;
      font-size: 0.85rem;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tauri Basic</h1>
    <p>Built with utm-dev</p>
    <span class="badge">iOS Simulator</span>
  </div>
</body>
</html>
