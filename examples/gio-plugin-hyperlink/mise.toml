# mise.toml — gio-plugin-hyperlink example runner
# Usage: mise run dev | mise run build | mise run ios | mise run android

[tasks.dev]
description = "Run on macOS (dev mode)"
run = "utm-dev gio run macos ."

[tasks.build]
description = "Build for macOS"
run = "utm-dev gio build macos ."

[tasks.ios]
description = "Run on iOS simulator (macOS only)"
run = "utm-dev gio run ios-simulator ."

[tasks.android]
description = "Run on Android device/emulator"
run = "utm-dev gio run android ."
