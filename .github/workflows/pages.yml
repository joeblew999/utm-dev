# Deploy Hugo documentation to GitHub Pages
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.155.3"
      HUGO_BASE_URL: "https://joeblew999.github.io/utm-dev/"
    steps:
      - uses: actions/checkout@v4

      # Hugo extended required for SCSS in hugo-book theme (go install gives non-extended)
      - name: Install Hugo Extended
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Install theme (if not present)
        run: |
          if [ ! -d docs/themes/hugo-book ]; then
            git clone --depth 1 https://github.com/alex-shpak/hugo-book.git docs/themes/hugo-book
          fi

      - name: Build Hugo site
        run: cd docs && hugo --minify --baseURL "$HUGO_BASE_URL"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
