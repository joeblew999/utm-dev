# Taskfile for managing .src dependencies
# https://taskfile.dev

version: '3'

vars:
  # Repository URLs
  GIO_REPO: https://github.com/gioui/gio.git
  GIO_CMD_REPO: https://github.com/gioui/gio-cmd.git
  GIO_PLUGINS_REPO: https://github.com/gioui-plugins/gio-plugins.git
  GIO_PLUGINS_FORK: https://github.com/joeblew999/gio-plugins.git
  ROBOTGO_REPO: https://github.com/go-vgo/robotgo.git

  # Pinned versions (keep in sync with main Taskfile.yml)
  # Updated: 2025-12-20
  #
  # Note: Gio uses tags (v0.9.0, v0.8.0, etc.) but gio-plugins v0.9.1
  # requires commits AFTER v0.9.0, so we pin to a specific commit hash.
  # This is Go's pseudo-version format: v0.9.1-0.YYYYMMDDHHMMSS-<hash>
  #
  GIO_VERSION: 7bcb315ee174  # v0.9.1-0.20251215212054-7bcb315ee174 (post v0.9.0)
  GIO_TAG: v0.9.0  # Latest official tag (for reference)
  GIO_CMD_VERSION: v0.9.0  # gio-cmd latest tag
  GIO_PLUGINS_VERSION: v0.9.1
  ROBOTGO_VERSION: v0.100.10  # Latest stable

tasks:
  help:
    desc: Show available src tasks
    cmds:
      - 'task --list | grep "src:"'

  # Clone/update all dependencies
  update:all:
    desc: Update all .src dependencies to latest
    cmds:
      - task: update:gio
      - task: update:gio-cmd
      - task: update:gio-plugins
      - task: update:robotgo

  update:gio:
    desc: Update gio to latest main
    cmds:
      - |
        if [ -d gio ]; then
          cd gio && git pull origin main
        else
          git clone --depth 1 {{.GIO_REPO}}
        fi

  update:gio-cmd:
    desc: Update gio-cmd to latest main
    cmds:
      - |
        if [ -d gio-cmd ]; then
          cd gio-cmd && git pull origin main
        else
          git clone --depth 1 {{.GIO_CMD_REPO}}
        fi

  update:gio-plugins:
    desc: Update gio-plugins to latest main
    cmds:
      - |
        if [ -d gio-plugins ]; then
          cd gio-plugins && git pull origin main
        else
          git clone --depth 1 {{.GIO_PLUGINS_REPO}}
        fi

  update:robotgo:
    desc: Update robotgo to latest main
    cmds:
      - |
        if [ -d robotgo ]; then
          cd robotgo && git pull origin main
        else
          git clone --depth 1 {{.ROBOTGO_REPO}}
        fi

  # Status checks
  status:
    desc: Show git status of all dependencies
    cmds:
      - echo "=== gio ===" && cd gio 2>/dev/null && git log -1 --oneline || echo "Not cloned"
      - echo "=== gio-cmd ===" && cd gio-cmd 2>/dev/null && git log -1 --oneline || echo "Not cloned"
      - echo "=== gio-plugins ===" && cd gio-plugins 2>/dev/null && git log -1 --oneline || echo "Not cloned"
      - echo "=== robotgo ===" && cd robotgo 2>/dev/null && git log -1 --oneline || echo "Not cloned"

  # Run demos
  demo:webviewer:
    desc: Run gio-plugins webviewer demo
    dir: gio-plugins/webviewer/demo
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  demo:hyperlink:
    desc: Run gio-plugins hyperlink demo
    dir: gio-plugins/hyperlink/demo
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  demo:auth:
    desc: Run gio-plugins auth demo (BROKEN - demo code outdated)
    dir: gio-plugins/auth/demo
    cmds:
      - echo "ERROR - Auth demo is broken in gio-plugins v0.9.1"
      - echo "The demo uses GoogleDummyButton and AppleDummyButton which no longer exist"
      - echo "See .src/gio-plugins/auth/gioauth/authlayout/ for current API"
      - echo ""
      - echo "Skipping demo launch..."
      - exit 1

  demo:explorer:
    desc: Run gio-plugins explorer demo (file system access)
    dir: gio-plugins/explorer/demo
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  demo:share:
    desc: Run gio-plugins share demo (share content)
    dir: gio-plugins/share/demo
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  demo:safedata:plugin:
    desc: Run safedata demo with gio-plugin integration
    dir: gio-plugins/safedata/demo/gio-with-gioplugin
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  demo:safedata:standalone:
    desc: Run safedata demo standalone version
    dir: gio-plugins/safedata/demo/gio-with-standalone
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go run .

  # Search helpers
  search:webview:
    desc: Search for webview implementation patterns
    cmds:
      - grep -r "WebViewOp" gio-plugins/webviewer/ --include="*.go" | head -20

  search:navigate:
    desc: Search for navigation patterns
    cmds:
      - grep -r "NavigateCmd" gio-plugins/webviewer/ --include="*.go" | head -20

  # Clean
  clean:
    desc: Remove all cloned repos (careful!)
    cmds:
      - echo "This will remove all cloned repos. Press Ctrl+C to cancel."
      - sleep 3
      - rm -rf gio gio-cmd
      - echo "Removed gio and gio-cmd (keeping gio-plugins and robotgo)"

  clean:all:
    desc: Remove ALL cloned repos including gio-plugins and robotgo
    cmds:
      - echo "This will remove ALL repos. Press Ctrl+C to cancel."
      - sleep 5
      - rm -rf gio gio-cmd gio-plugins robotgo
      - echo "All repos removed"

  # Version info
  versions:
    desc: Show versions of all dependencies
    cmds:
      - echo "=== gio ===" && cd gio 2>/dev/null && git describe --tags --always || echo "Not cloned"
      - echo "=== gio-cmd ===" && cd gio-cmd 2>/dev/null && git describe --tags --always || echo "Not cloned"
      - echo "=== gio-plugins ===" && cd gio-plugins 2>/dev/null && git describe --tags --always || echo "Not cloned"
      - echo "=== robotgo ===" && cd robotgo 2>/dev/null && git describe --tags --always || echo "Not cloned"

  # Checkout specific versions
  checkout:gio-plugins:v0.9.1:
    desc: Checkout gio-plugins v0.9.1
    dir: gio-plugins
    cmds:
      - git fetch --tags
      - git checkout v0.9.1

  checkout:gio-plugins:main:
    desc: Checkout gio-plugins main branch
    dir: gio-plugins
    cmds:
      - git checkout main
      - git pull origin main

  checkout:gio:pinned:
    desc: Checkout gio to pinned version ({{.GIO_VERSION}})
    dir: gio
    cmds:
      - git fetch origin
      - git checkout {{.GIO_VERSION}}

  checkout:gio:main:
    desc: Checkout gio main branch
    dir: gio
    cmds:
      - git checkout main
      - git pull origin main

  checkout:gio-plugins:pinned:
    desc: Checkout gio-plugins to pinned version ({{.GIO_PLUGINS_VERSION}})
    dir: gio-plugins
    cmds:
      - git fetch --tags
      - git checkout {{.GIO_PLUGINS_VERSION}}

  checkout:robotgo:pinned:
    desc: Checkout robotgo to pinned version ({{.ROBOTGO_VERSION}})
    dir: robotgo
    cmds:
      - git fetch --tags
      - git checkout {{.ROBOTGO_VERSION}}

  checkout:gio-cmd:pinned:
    desc: Checkout gio-cmd to pinned version ({{.GIO_CMD_VERSION}})
    dir: gio-cmd
    cmds:
      - git fetch --tags
      - git checkout {{.GIO_CMD_VERSION}}

  # Checkout all to pinned versions
  checkout:all:pinned:
    desc: Checkout all repos to pinned versions
    cmds:
      - task: checkout:gio:pinned
      - task: checkout:gio-cmd:pinned
      - task: checkout:gio-plugins:pinned
      - task: checkout:robotgo:pinned

  # Show pinned vs current versions
  versions:compare:
    desc: Compare pinned versions vs current checkout
    cmds:
      - 'echo "=== Pinned Versions ==="'
      - 'echo "  gio:         {{.GIO_VERSION}}"'
      - 'echo "  gio-plugins: {{.GIO_PLUGINS_VERSION}}"'
      - 'echo "  robotgo:     {{.ROBOTGO_VERSION}}"'
      - 'echo ""'
      - 'echo "=== Current Checkouts ==="'
      - 'echo -n "  gio:         " && cd gio 2>/dev/null && git describe --tags --always || echo "Not cloned"'
      - 'echo -n "  gio-plugins: " && cd gio-plugins 2>/dev/null && git describe --tags --always || echo "Not cloned"'
      - 'echo -n "  robotgo:     " && cd robotgo 2>/dev/null && git describe --tags --always || echo "Not cloned"'

  # ============================================================
  # Fork management (gio-plugins fork: joeblew999/gio-plugins)
  # ============================================================

  fork:setup:
    desc: Add fork remote to gio-plugins (upstream + fork)
    dir: gio-plugins
    cmds:
      - git remote add fork {{.GIO_PLUGINS_FORK}} 2>/dev/null || echo "fork remote already exists"
      - git remote set-url fork {{.GIO_PLUGINS_FORK}}
      - git fetch fork
      - echo "Remotes configured:"
      - git remote -v

  fork:status:
    desc: Show fork remote and branch status
    dir: gio-plugins
    cmds:
      - echo "=== Remotes ==="
      - git remote -v
      - echo ""
      - echo "=== Current Branch ==="
      - git branch --show-current
      - echo ""
      - echo "=== Local Changes ==="
      - git status --short

  fork:branch:
    desc: Create a feature branch for a fix (usage - task fork:branch -- fix-auto-navigate)
    dir: gio-plugins
    cmds:
      - git fetch origin
      - git checkout -b {{.CLI_ARGS}} origin/main
      - echo "Created branch {{.CLI_ARGS}} from upstream main"

  fork:push:
    desc: Push current branch to fork
    dir: gio-plugins
    cmds:
      - git push fork HEAD
      - echo "Pushed to fork"

  fork:pr:
    desc: Create PR from fork to upstream (needs gh CLI)
    dir: gio-plugins
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        echo "Creating PR from joeblew999/gio-plugins:$BRANCH -> gioui-plugins/gio-plugins:main"
        gh pr create --repo gioui-plugins/gio-plugins --head "joeblew999:$BRANCH" --base main

  fork:sync:
    desc: Sync fork with upstream (fetch upstream main, push to fork)
    dir: gio-plugins
    cmds:
      - git fetch origin
      - git checkout main
      - git merge origin/main
      - git push fork main
      - echo "Fork synced with upstream"

  fork:diff:
    desc: Show diff between current branch and upstream main
    dir: gio-plugins
    cmds:
      - git fetch origin
      - git diff origin/main...HEAD --stat
      - echo ""
      - git diff origin/main...HEAD
